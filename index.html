<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NetKing Team - Premium Android Apps</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/TheFish-cyber/Netking/main/ic_launcher.png">
    
    <style>
        /* --- RESET & MODERN FONTS --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: rgba(0, 102, 255, 0.2); 
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        input, textarea, select {
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }

        html, body {
            width: 100%;
            max-width: 100vw;
            overflow-x: hidden;
            background-color: #020617;
            color: #f1f5f9;
            scroll-behavior: smooth;
            transition: background 0.5s ease;
        }

        /* --- BACKGROUND THEMES MATRIX --- */
        #theme-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            pointer-events: none;
        }

        .theme-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
            transition: opacity 1s ease;
            opacity: 0;
        }

        /* 1. Aurora Theme */
        body.theme-aurora { background-color: #031417; }
        .theme-aurora .theme-overlay {
            opacity: 1;
            background: radial-gradient(circle at 50% -20%, rgba(4, 219, 133, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 10% 30%, rgba(0, 102, 255, 0.1) 0%, transparent 40%);
        }

        /* 2. Galaxy Theme */
        body.theme-galaxy { background-color: #0b031a; }
        .theme-galaxy .theme-overlay {
            opacity: 1;
            background: radial-gradient(circle at 80% 20%, rgba(168, 85, 247, 0.2) 0%, transparent 50%),
                        radial-gradient(circle at 20% 80%, rgba(236, 72, 153, 0.1) 0%, transparent 40%);
        }

        /* 3. Stars Theme */
        body.theme-stars { background-color: #020617; }
        .theme-stars .theme-overlay {
            opacity: 1;
            background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.03) 0%, transparent 70%);
        }

        /* 4. Snowflakes Theme */
        body.theme-snowflakes { background-color: #0b132b; }
        .theme-snowflakes .theme-overlay {
            opacity: 1;
            background: linear-gradient(to bottom, rgba(255,255,255,0.05), transparent);
        }

        /* --- SCROLL ANIMATIONS --- */
        .scroll-anim {
            opacity: 0;
            filter: blur(20px); 
            transform: translateY(40px);
            transition: opacity 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), 
                        filter 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), 
                        transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            will-change: opacity, filter, transform;
        }
        .scroll-anim.show { opacity: 1; filter: blur(0px); transform: translateY(0); }

        .scroll-fade { opacity: 0; filter: blur(15px); transition: opacity 0.7s ease-in-out, filter 0.7s ease-in-out; }
        .scroll-fade.show { opacity: 1; filter: blur(0); }

        @keyframes popupScale {
            from { opacity: 0; transform: scale(0.93); filter: blur(10px); }
            to { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        @keyframes neonPulse {
            0% { box-shadow: 0 0 15px rgba(0, 102, 255, 0.2), inset 0 0 10px rgba(0, 102, 255, 0.05); border-color: rgba(0, 102, 255, 0.25); }
            50% { box-shadow: 0 0 30px rgba(0, 102, 255, 0.45), inset 0 0 15px rgba(0, 102, 255, 0.15); border-color: rgba(0, 102, 255, 0.5); }
            100% { box-shadow: 0 0 15px rgba(0, 102, 255, 0.2), inset 0 0 10px rgba(0, 102, 255, 0.05); border-color: rgba(0, 102, 255, 0.25); }
        }

        @keyframes gradientBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 16px;
        }

        .neon-box {
            background: rgba(7, 13, 31, 0.75);
            border: 1px solid rgba(0, 102, 255, 0.3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 14px;
            animation: neonPulse 5s infinite ease-in-out;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .neon-box:hover {
            border-color: rgba(0, 102, 255, 0.8);
            background: rgba(9, 18, 44, 0.85);
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 0 40px rgba(0, 102, 255, 0.4), inset 0 0 20px rgba(0, 102, 255, 0.1);
        }

        /* --- HEADER --- */
        header {
            border-bottom: 1px solid rgba(0, 102, 255, 0.2);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(2, 6, 23, 0.85);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 65px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            cursor: pointer;
        }

        .logo-img {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 1px solid #3b82f6;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.6);
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .logo:hover .logo-img { transform: rotate(360deg); }

        .logo-text {
            font-size: 1.05rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.3px;
        }

        .logo-text span {
            color: #3b82f6;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-top: -1px;
        }

        .logo-text svg { width: 10px; height: 10px; fill: currentColor; }

        nav ul {
            display: flex;
            list-style: none;
            gap: 20px;
        }

        nav ul a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            padding: 4px 0;
        }

        nav ul a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: #3b82f6;
            transition: width 0.3s ease;
        }

        nav ul a:hover::after, nav ul a.active::after { width: 100%; }
        nav ul a:hover, nav ul a.active { color: #fff; text-shadow: 0 0 8px rgba(59, 130, 246, 0.6); }

        .header-right-zone {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* --- THEME SELECTOR --- */
        .theme-select-wrapper {
            position: relative;
            display: inline-block;
        }
        .theme-select-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 7px 12px;
            border-radius: 18px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }
        .theme-select-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.25);
        }
        .theme-select-btn svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2; }
        
        .theme-dropdown {
            position: absolute;
            top: 40px;
            right: 0;
            background: #0b1329;
            border: 1px solid rgba(0, 102, 255, 0.25);
            border-radius: 12px;
            padding: 6px;
            display: none;
            flex-direction: column;
            gap: 4px;
            min-width: 140px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 110;
        }
        .theme-dropdown.show { display: flex; }
        .theme-opt {
            background: transparent;
            border: none;
            color: #94a3b8;
            padding: 8px 12px;
            font-size: 0.75rem;
            font-weight: 500;
            text-align: left;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .theme-opt:hover { background: rgba(0, 102, 255, 0.15); color: #fff; }
        .theme-opt.active { background: #0052cc; color: #fff; }
        .theme-opt svg { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 2; }

        .btn-login {
            background: rgba(59, 130, 246, 0.12);
            border: 1px solid rgba(59, 130, 246, 0.35);
            color: #fff;
            padding: 7px 14px;
            border-radius: 18px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-login svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2; }
        .btn-login:hover { background: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.6); transform: scale(1.05); }

        /* --- TICKER BAR --- */
        .live-ticker-container {
            display: flex;
            justify-content: center;
            width: 100%;
            padding: 10px 16px 0 16px;
        }

        .live-ticker-bar {
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(59, 130, 246, 0.4);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.15);
            color: #94a3b8;
            font-size: 0.8rem;
            padding: 6px 18px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            min-height: 38px;
            max-width: 100%;
            overflow: hidden;
        }

        .live-badge {
            background: #ef4444;
            color: #fff;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 20px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 4px;
            animation: pulse 1.5s infinite;
            flex-shrink: 0;
        }
        .live-badge::before { content: ''; width: 6px; height: 6px; background: #fff; border-radius: 50%; }

        #ticker-content {
            display: inline-block;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        @keyframes pulse {
            0% { opacity: 0.7; transform: scale(0.97); }
            50% { opacity: 1; transform: scale(1.03); box-shadow: 0 0 12px rgba(239, 68, 68, 0.6); }
            100% { opacity: 0.7; transform: scale(0.97); }
        }

        /* --- GUEST ALERT FRAME --- */
        .guest-alert-frame {
            background: rgba(239, 68, 68, 0.08);
            border: 1px dashed rgba(239, 68, 68, 0.4);
            border-radius: 12px;
            padding: 16px;
            margin: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .guest-alert-header {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ef4444;
            font-weight: 700;
            font-size: 0.9rem;
        }
        .guest-alert-header svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; }
        .guest-tutorial-box {
            background: rgba(2, 6, 23, 0.5);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            color: #94a3b8;
            line-height: 1.5;
        }
        .guest-tutorial-box span { color: #3b82f6; font-weight: 600; cursor: pointer; text-decoration: underline; }

        /* --- HERO --- */
        .hero { padding: 50px 0 30px 0; text-align: center; }
        .welcome-tag {
            background: rgba(0, 102, 255, 0.1);
            color: #3b82f6;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            display: inline-flex;
            margin-bottom: 16px;
            border: 1px solid rgba(0, 102, 255, 0.2);
        }

        .hero h2 {
            font-size: 3rem;
            font-weight: 850;
            color: #fff;
            margin-bottom: 10px;
            line-height: 1.2;
        }

        .hero h2 span {
            color: #3b82f6;
            background: linear-gradient(45deg, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle { font-size: 1rem; color: #94a3b8; margin-bottom: 16px; font-weight: 500; letter-spacing: 0.5px; }
        .hero-desc { max-width: 600px; color: #64748b; font-size: 0.85rem; line-height: 1.6; margin: 0 auto 28px auto; }
        .hero-buttons { display: flex; gap: 12px; justify-content: center; }
        
        .btn-discord, .btn-view-apps { padding: 12px 24px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .btn-discord { background: #5865f2; color: white; box-shadow: 0 4px 14px rgba(88, 101, 242, 0.3); }
        .btn-discord:hover { background: #4752c4; transform: translateY(-3px); }
        .btn-discord svg { width: 16px; height: 16px; fill: currentColor; }
        
        .btn-view-apps { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); color: white; }
        .btn-view-apps:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-3px); }
        .btn-view-apps svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; }

        /* --- DASHBOARD --- */
        .dashboard-row { display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; margin-bottom: 40px; }
        .card-panel { padding: 24px; }
        .panel-title { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; color: #3b82f6; letter-spacing: 0.8px; margin-bottom: 18px; display: flex; align-items: center; gap: 6px; }
        .panel-title svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2; }
        
        .notice-box { background: rgba(255, 255, 255, 0.02); border-left: 4px solid #ff416c; border-radius: 0 8px 8px 0; position: relative; overflow: hidden; padding: 16px; }
        .notice-date { font-size: 0.7rem; color: #ff416c; margin-bottom: 6px; font-weight: 700; letter-spacing: 0.5px;}
        .notice-content h4 { font-size: 0.9rem; color: #fff; margin-bottom: 4px;}
        .notice-content p { font-size: 0.8rem; color: #94a3b8; line-height: 1.5; }

        .stats-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; text-align: center; }
        .stats-wrapper-row { display: contents; }
        .stat-item { background: rgba(255,255,255,0.01); padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.02); transition: all 0.3s; }
        .stat-item:hover { background: rgba(59, 130, 246, 0.05); border-color: rgba(59, 130, 246, 0.2); }
        .stat-number { font-size: 1.3rem; font-weight: 700; color: #fff; }
        .stat-label { font-size: 0.7rem; color: #64748b; margin-top: 4px; font-weight: 500; }
        .stats-footer { text-align: center; font-size: 0.75rem; color: #3b82f6; margin-top: 18px; padding-top: 12px; border-top: 1px solid rgba(255, 255, 255, 0.04); font-weight: 500; }

        /* --- FEATURES --- */
        .intro-section { margin-bottom: 50px; }
        .section-headline { font-size: 1.65rem; font-weight: 800; color: #fff; margin-bottom: 8px; text-align: center !important; width: 100%; display: block; letter-spacing: -0.5px; }
        .section-subheadline { font-size: 0.85rem; color: #64748b; text-align: center !important; width: 100%; display: block; margin-bottom: 30px; font-weight: 500; }
        
        .features-showcase-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 30px; }
        .feature-detail-card { padding: 24px; }
        .feature-tag-row { display: flex; gap: 8px; margin-bottom: 14px; }
        .feat-tag { font-size: 0.65rem; font-weight: 700; padding: 3px 10px; border-radius: 4px; background: rgba(59, 130, 246, 0.1); color: #3b82f6; border: 1px solid rgba(59, 130, 246, 0.2); }
        .feature-detail-card h4 { font-size: 1.1rem; color: #fff; margin-bottom: 10px; }
        .feature-detail-card p { font-size: 0.82rem; color: #94a3b8; line-height: 1.6; }

        /* --- CONSULTING --- */
        .consulting-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 50px; }
        .consult-card { padding: 24px; }
        .consult-question { font-size: 1rem; font-weight: 700; color: #eab308; margin-bottom: 10px; display: flex; align-items: center; gap: 8px;}
        .consult-question svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; }
        .consult-answer { font-size: 0.85rem; color: #94a3b8; line-height: 1.6; }

        /* --- PRICING --- */
        .pricing-section { margin-bottom: 50px; }
        .pricing-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
        .price-tier-card { padding: 24px; text-align: center; display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden;}
        
        .price-tier-card.popular { border-color: rgba(59, 130, 246, 0.4); }
        .price-tier-card.popular:hover { box-shadow: 0 0 35px rgba(59, 130, 246, 0.45); border-color: #3b82f6; }
        .price-tier-card.supporter-tier { border-color: rgba(168, 85, 247, 0.4); }
        .price-tier-card.supporter-tier:hover { box-shadow: 0 0 35px rgba(168, 85, 247, 0.45); border-color: #a855f7; }
        
        .pop-badge, .supp-badge { position: absolute; top: 12px; right: -35px; transform: rotate(45deg); color: #fff; font-size: 0.55rem; font-weight: 800; padding: 4px 40px; text-transform: uppercase; letter-spacing: 0.5px; }
        .pop-badge { background: #3b82f6; }
        .supp-badge { background: #a855f7; }
        
        .tier-name { font-size: 1rem; font-weight: 700; color: #fff; margin-bottom: 10px; text-align: left; display: flex; align-items: center; gap: 6px; }
        .tier-name svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; }
        .tier-price { font-size: 1.4rem; font-weight: 800; color: #3b82f6; margin-bottom: 16px; text-align: left; }
        .tier-price span { font-size: 0.75rem; color: #64748b; font-weight: 400; }
        .tier-features { list-style: none; text-align: left; font-size: 0.78rem; color: #94a3b8; margin-bottom: 24px; flex-grow: 1;}
        .tier-features li { margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .tier-features svg { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 2.5; flex-shrink: 0; }

        /* --- APPS GRID --- */
        .apps-section { margin-bottom: 50px; }
        .apps-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .app-card { padding: 24px; text-align: center; display: flex; flex-direction: column; justify-content: space-between; position: relative;}
        .app-card:hover { transform: translateY(-6px); border-color: rgba(0, 102, 255, 0.7); box-shadow: 0 12px 40px rgba(0, 102, 255, 0.35); }
        .app-icon-wrapper { width: 64px; height: 64px; margin: 0 auto 16px auto; position: relative; }
        
        .app-icon-vector { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .app-icon-vector svg { width: 38px; height: 38px; filter: drop-shadow(0 0 6px rgba(59, 130, 246, 0.8)); }

        .badges-row { display: flex; justify-content: center; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
        .badge { font-size: 0.6rem; font-weight: 700; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.3px; display: inline-flex; align-items: center; gap: 3px; }
        .badge svg { width: 8px; height: 8px; fill: currentColor; }
        .bg-verified { background: rgba(16, 185, 129, 0.12); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); }
        .bg-risk { background: rgba(234, 88, 12, 0.12); color: #ea580c; border: 1px solid rgba(234, 88, 12, 0.2); }
        .bg-hot { background: rgba(239, 68, 68, 0.12); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
        .bg-insanity { background: linear-gradient(135deg, #3b82f6, #a855f7, #ec4899); color: #fff; background-size: 200% 200%; animation: gradientBg 3s ease infinite; }
        
        .app-card h3 { font-size: 1.1rem; color: #fff; margin-bottom: 6px; font-weight: 700; }
        .app-version { font-size: 0.7rem; color: #94a3b8; background: rgba(255, 255, 255, 0.05); padding: 2px 8px; border-radius: 4px; display: inline-block; margin-bottom: 12px; font-weight: 600; }
        .app-desc { font-size: 0.8rem; color: #94a3b8; line-height: 1.5; margin-bottom: 20px; text-align: left; }
        .app-card-footer { border-top: 1px solid rgba(255, 255, 255, 0.04); padding-top: 16px; display: flex; flex-direction: column; gap: 8px; }

        .btn-download { background: #0052cc; color: #fff; text-decoration: none; padding: 10px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; text-align: center; cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); border: 1px solid rgba(0, 102, 255, 0.3); box-shadow: 0 4px 10px rgba(0, 82, 204, 0.2); display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-download svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2.5; }
        .btn-download:hover:not(:disabled) { background: #0066ff; box-shadow: 0 6px 20px rgba(0, 102, 255, 0.5); transform: translateY(-2px); }

        .btn-download.risk-style:hover { background: #ea580c; color: #fff; }
        .btn-key-style { background: rgba(255, 255, 255, 0.03); color: #94a3b8; border: 1px solid rgba(255, 255, 255, 0.06); box-shadow: none; }
        .btn-key-style:hover { background: rgba(255, 255, 255, 0.08); color: #fff; border-color: rgba(255,255,255,0.2); }

        /* --- TUTORIALS --- */

        /* --- SUBSCRIPTION --- */
        #premium-page { display: none; padding: 40px 0; }
        .premium-form-card.neon-box { max-width: 520px; margin: 0 auto; padding: 30px; text-align: center; }

        .form-group label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 6px; font-weight: 600; }

    </style>
</head>
<body>
    <script>
        // --- LOGIC ĐẾM SỐ THỰC & TỰ ĐỘNG TĂNG TRƯỞNG PREMIUM ---
        document.addEventListener("DOMContentLoaded", () => {
            // 1. Bộ số liệu gốc xịn mịn
            const stats = {
                views: 284910,
                users: 14029,
                online: 381,
                downloads: 94112
            };

            // Định dạng phân tách dấu phẩy thông minh
            const formatNumber = (num) => {
                return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
            };

            // 2. Hàm cập nhật số liệu kết hợp hiệu ứng nhảy số mượt mà
            const updateUI = (isAnimated = false) => {
                const targets = [
                    { id: 'view-count', val: stats.views },
                    { id: 'user-count', val: stats.users },
                    { id: 'online-count', val: stats.online },
                    { id: 'dl-count', val: stats.downloads },
                    { id: 'footer-view', val: stats.views },
                    { id: 'footer-user', val: stats.users },
                    { id: 'footer-online', val: stats.online },
                    { id: 'footer-dl', val: stats.downloads }
                ];

                targets.forEach(target => {
                    const el = document.getElementById(target.id);
                    if (!el) return;
                    
                    if (isAnimated) {
                        // Hiệu ứng chạy số tăng tốc lúc mới tải trang
                        let start = Math.floor(target.val * 0.85); 
                        if (target.id.includes('online')) start = 10; 
                        
                        const duration = 1500; 
                        const startTime = performance.now();
                        
                        const animate = (currentTime) => {
                            const elapsed = currentTime - startTime;
                            const progress = Math.min(elapsed / duration, 1);
                            const easeProgress = 1 - Math.pow(1 - progress, 3); // Cubic Ease Out
                            const currentVal = Math.floor(start + (target.val - start) * easeProgress);
                            
                            el.innerText = formatNumber(currentVal); 
                            
                            if (progress < 1) {
                                requestAnimationFrame(animate);
                            } else {
                                el.innerText = formatNumber(target.val);
                            }
                        };
                        requestAnimationFrame(animate);
                    } else {
                        // Tự cập nhật không hiệu ứng (để chạy ngầm vòng lặp live)
                        el.innerText = formatNumber(target.val);
                    }
                });
            };

            // Kích hoạt chạy hiệu ứng nhảy số tăng tốc lần đầu
            updateUI(true);

            // 3. Vòng lặp Real-time mô phỏng tương tác khách truy cập thật
            setInterval(() => {
                stats.views += Math.floor(Math.random() * 4) + 1; // View tăng liên tục
                
                const onlineChange = Math.floor(Math.random() * 7) - 3; // Biến động số người online tự nhiên
                stats.online = Math.max(150, stats.online + onlineChange); 

                if (Math.random() > 0.6) {
                    stats.downloads += 1;
                    if (Math.random() > 0.8) stats.users += 1;
                }
                updateUI(false);
            }, 3000); // Cứ mỗi 3 giây nhảy dữ liệu một lần cực mượt

            // --- GIỮ NGUYÊN CÁC LOGIC HỆ THỐNG GỐC CỦA BẠN BÊN DƯỚI ---
            const savedLang = localStorage.getItem('netking_lang') || 'vi';
            changeLanguage(savedLang);
            updateAuthDynamicUI();
            setInterval(triggerLiveTickerCycle, 4000);
            triggerLiveTickerCycle();
        });

        // --- SCROLL ANIM MATRIX INTERSECTION ---
        const scrollObjects = document.querySelectorAll('.scroll-anim, .scroll-fade');
        const observerOptions = { threshold: 0.05, rootMargin: "0px 0px -40px 0px" };
        
        const scrollObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if(entry.isIntersecting) {
                    entry.target.classList.add('show');
                }
            });
        }, observerOptions);

        scrollObjects.forEach(obj => scrollObserver.observe(obj));
    </script>
</body>
